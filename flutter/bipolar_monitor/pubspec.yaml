name: bipolar_monitor
description: Wellness mood tracking app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3
  dio_smart_retry: ^6.0.0

  # Storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Camera & Recording
  camera: ^0.11.0+2
  record: ^5.1.2
  permission_handler: ^11.3.1

  # Auth
  local_auth: ^2.2.0

  # Sharing & export
  share_plus: ^9.0.0

  # Background (iOS offline queue)
  background_fetch: ^1.2.1

  # Utils
  url_launcher: ^6.2.5
  intl: ^0.19.0
  http: ^1.2.1
  uuid: ^4.4.2

  # UI & Fonts
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Connectivity & Background
  connectivity_plus: ^6.0.3
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
