version: "3.9"

# DGX Spark deployment — API + ML inference
# NAS services (PostgreSQL + MinIO) run separately on NAS host

services:
  api:
    build: ./api
    container_name: bipolar_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - bipolar_tmp:/tmp/bipolar
    networks:
      - bipolar_net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      ml:
        condition: service_healthy

  ml:
    build: ./ml
    container_name: bipolar_ml
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-bipolar-media}
      - API_CALLBACK_URL=http://api:8000
    volumes:
      - model_cache:/root/.cache
      - bipolar_tmp:/tmp/bipolar
    networks:
      - bipolar_net
    expose:
      - "8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    container_name: bipolar_caddy
    restart: unless-stopped
    ports:
      - "8080:8080"   # Cloudflare Tunnel points here
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - bipolar_net

volumes:
  bipolar_tmp:
  model_cache:
  caddy_data:
  caddy_config:

networks:
  bipolar_net:
    driver: bridge
