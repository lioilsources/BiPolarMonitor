version: "3.9"

# DGX Spark deployment — ML + OpenFace inference (GPU services)
# API, Postgres, MinIO and Cloudflare Tunnel run on the NAS host
# NAS reaches this host over the LAN via Caddy on port 8090

services:
  ml:
    build: ./ml
    container_name: bipolar_ml
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-bipolar-media}
      - API_CALLBACK_URL=${API_CALLBACK_URL}
      - OPENFACE_URL=http://openface:8002
    volumes:
      - model_cache:/root/.cache
      - bipolar_tmp:/tmp/bipolar
    networks:
      - bipolar_net
    expose:
      - "8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      openface:
        condition: service_healthy

  openface:
    build: ./openface
    container_name: bipolar_openface
    restart: unless-stopped
    volumes:
      - bipolar_tmp:/tmp/bipolar
    networks:
      - bipolar_net
    expose:
      - "8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  caddy:
    image: caddy:2-alpine
    container_name: bipolar_caddy
    restart: unless-stopped
    ports:
      - "8090:8090"   # NAS reaches ML/OpenFace via this LAN port
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - bipolar_net
    depends_on:
      ml:
        condition: service_healthy

volumes:
  bipolar_tmp:
  model_cache:
  caddy_data:
  caddy_config:

networks:
  bipolar_net:
    driver: bridge
